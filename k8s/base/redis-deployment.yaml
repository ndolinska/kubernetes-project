apiVersion: apps/v1
kind: Deployment
metadata:
  name: redis
  namespace: tasks
spec:
  replicas: 1
  selector:
    matchLabels:
      app: redis
  template:
    metadata:
      labels:
        app: redis
      # Adnotacja dla Prometheusa — scrape metryk (Feature 17)
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/port: "6379"
    spec:
      securityContext:
        runAsUser: 999
        runAsGroup: 999

      containers:
        - name: redis
          image: redis:7-alpine
          ports:
            - containerPort: 6379

          # Readiness — K8s nie puści ruchu dopóki Redis nie odpowiada na PING
          readinessProbe:
            exec:
              command: ["redis-cli", "ping"]
            initialDelaySeconds: 5
            periodSeconds: 5

          # Liveness — restart jeśli Redis przestaje odpowiadać
          livenessProbe:
            exec:
              command: ["redis-cli", "ping"]
            initialDelaySeconds: 15
            periodSeconds: 10

          resources:
            requests:
              memory: "64Mi"
              cpu: "50m"
            limits:
              memory: "128Mi"
              cpu: "200m"
